name: Build Wird Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create TWA Android Project
        run: |
          mkdir -p twa/app/src/main/java/com/wird/app
          mkdir -p twa/app/src/main/res/{values,drawable,mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          mkdir -p twa/gradle/wrapper

          cat > twa/build.gradle << 'BUILDEOF'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          BUILDEOF

          cat > twa/gradle.properties << 'PROPEOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          kotlin.code.style=official
          PROPEOF

          echo "include ':app'" > twa/settings.gradle
          echo "rootProject.name = \"Wird\"" >> twa/settings.gradle

          cd twa && gradle wrapper --gradle-version 8.5 && cd ..

          cat > twa/app/build.gradle << 'APPEOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.wird.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.wird.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
              signingConfigs {
                  release {
                      storeFile file("wird-release.jks")
                      storePassword "wird2024"
                      keyAlias "wird"
                      keyPassword "wird2024"
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          APPEOF

          echo "" > twa/app/proguard-rules.pro

          keytool -genkeypair -v -keystore twa/app/wird-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias wird -storepass wird2024 -keypass wird2024 \
            -dname "CN=Wird, OU=Dev, O=Wird, L=Dhaka, ST=Dhaka, C=BD"

          cat > twa/app/src/main/AndroidManifest.xml << 'MANIFESTEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Wird"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.Wird">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboard|keyboardHidden"
                      android:launchMode="singleTask"
                      android:theme="@style/Theme.Wird.Launcher">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https" android:host="wird.app" />
                      </intent-filter>
                      <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://wird.app" />
                      <meta-data android:name="android.support.customtabs.trusted.SCREEN_ORIENTATION" android:value="portrait" />
                      <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR" android:resource="@color/themeColor" />
                      <meta-data android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR" android:resource="@color/themeColor" />
                      <meta-data android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR_DARK" android:resource="@color/themeColor" />
                      <meta-data android:name="android.support.customtabs.trusted.TOOLBAR_COLOR" android:resource="@color/themeColor" />
                      <meta-data android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE" android:resource="@color/themeColor" />
                      <meta-data android:name="android.support.customtabs.trusted.SPLASH_BACKGROUND_COLOR" android:resource="@color/themeColor" />
                  </activity>
              </application>
          </manifest>
          MANIFESTEOF

          cat > twa/app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Wird</string>
              <color name="themeColor">#0D4B3C</color>
              <color name="splashColor">#0D4B3C</color>
          </resources>
          STRINGS

          cat > twa/app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Wird" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/themeColor</item>
                  <item name="colorPrimaryDark">@color/themeColor</item>
                  <item name="colorAccent">@color/themeColor</item>
                  <item name="android:windowBackground">@color/splashColor</item>
              </style>
              <style name="Theme.Wird.Launcher" parent="Theme.Wird">
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          STYLES

          cp public/icon-512.png twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp public/icon-192.png twa/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/icon-192.png twa/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/icon-512.png twa/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/icon-512.png twa/app/src/main/res/mipmap-xxhdpi/ic_launcher.png

          echo "TWA project created successfully"

      - name: Build Release APK
        working-directory: twa
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        working-directory: twa
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/wird-unsigned.apk 2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/wird.apk 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wird-android-apk
          path: twa/app/build/outputs/apk/release/wird.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name != 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Wird v1.0.0
          files: twa/app/build/outputs/apk/release/wird.apk
          body: |
            Wird — Your daily Islamic companion. Quran, Duas, Prayer Times & more.
