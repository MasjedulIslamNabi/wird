name: Build Wird Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'

permissions:
  contents: write
  pages: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        run: npm run build

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -x lintVitalAnalyzeRelease

      - name: Rename APK with commit SHA + date
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          DATE=$(date +'%Y-%m-%d')
          cp android/app/build/outputs/apk/debug/app-debug.apk "wird-${DATE}-${SHORT_SHA}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk app-debug.apk
          ls -la wird-*.apk app-debug.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wird-debug-apk
          path: wird-*.apk
          retention-days: 30
          compression-level: 0

      - name: Prepare GitHub Pages directory
        run: |
          mkdir -p apk-publish
          cp app-debug.apk apk-publish/app-debug.apk
          cat > apk-publish/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Wird Android APK</title>
            <style>
              body { font-family: system-ui, sans-serif; background: #0D4B3C; color: #FBF7F0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
              .card { background: #FBF7F0; color: #0D4B3C; padding: 2rem; border-radius: 1rem; text-align: center; max-width: 400px; }
              a { display: inline-block; background: #0D4B3C; color: #FBF7F0; padding: 1rem 2rem; border-radius: 0.5rem; text-decoration: none; font-weight: bold; margin-top: 1rem; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>📱 Wird Android APK</h1>
              <p>Download the latest build of the Wird Islamic companion app.</p>
              <a href="app-debug.apk">⬇ Download APK</a>
            </div>
          </body>
          </html>
          HTML

      - name: Deploy APK to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apk-publish
          publish_branch: gh-pages
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy latest APK'
