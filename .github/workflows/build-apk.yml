name: Build Wird Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        run: npm run build

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -x lintVitalAnalyzeRelease

      - name: Rename APK with commit SHA + date
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          DATE=$(date +'%Y-%m-%d')
          cp android/app/build/outputs/apk/debug/app-debug.apk "wird-${DATE}-${SHORT_SHA}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk app-debug.apk
          ls -la wird-*.apk app-debug.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wird-debug-apk
          path: wird-*.apk
          retention-days: 30
          compression-level: 0

      - name: Delete existing 'latest' release (prevent immutable release error)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/latest --jq '.id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting existing release ID: $RELEASE_ID"
            gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID || true
          fi
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/latest || true

      - name: Publish APK to "latest" release (stable download URL)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Wird Android (Latest Build)
          body: |
            ## Latest Android APK build

            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.run_id }}
            **Trigger:** ${{ github.event_name }} by @${{ github.actor }}

            ### Install
            1. Download `app-debug.apk` below
            2. On your Android phone, enable "Install unknown apps" for your browser (Chrome / Firefox)
            3. Tap the downloaded APK to install
            4. Open Wird — toggle Adhan Alarm in Settings to enable prayer-time notifications

            ### Stable download URL (always points to newest build)
            ```
            https://github.com/MasjedulIslamNabi/wird/releases/latest/download/app-debug.apk
            ```
          files: |
            app-debug.apk
            wird-*.apk

      - name: Upload to versioned release (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: wird-*.apk
          generate_release_notes: true
